services:
  postgres:
    image: postgres:16
    container_name: feed_postgres
    restart: always
    ports:
      - "5470:5432"
    environment:
      POSTGRES_USER: feed_user
      POSTGRES_PASSWORD: feed_password
      POSTGRES_DB: feed_system
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: feed_redis
    restart: always
    ports:
      - "6383:6379"

volumes:
  postgres_data: